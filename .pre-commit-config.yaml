default_language_version:
  python: python3

default_stages: [pre-commit]

repos:
  # Formatters
  - repo: https://github.com/hakancelikdev/unimport
    rev: 1.2.1
    hooks:
      - id: unimport
        description: "Automatically removes unused imports from Python code."
        args:
          - --remove

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: debug-statements
        description: "Detects Python `print` or `pdb` debug statements."
      - id: check-ast
        description: "Ensures Python files are parsable and valid."
      - id: check-case-conflict
        description: "Checks for filename conflicts in case-insensitive filesystems."
      - id: check-builtin-literals
        description: "Enforces literal syntax when initializing Python built-in types."
      - id: check-docstring-first
        description: "Checks that the docstring is the first statement in a file."
      - id: check-merge-conflict
        description: "Detects unresolved merge conflict markers in files."
      - id: check-yaml
        description: "Validates YAML files."
        args: ["--unsafe"]
      - id: end-of-file-fixer
        description: "Ensures files end with a single newline character."
      - id: mixed-line-ending
        description: "Replaces or checks for mixed line endings."
      - id: pretty-format-json
        description: "Formats JSON files and sorts keys."
        args: [--autofix]
        exclude_types:
          - jupyter # Avoid conflict with nbstripout cf. https://github.com/kynan/nbstripout/issues/185
      - id: trailing-whitespace
        description: "Trims trailing whitespace from files."

  - repo: https://github.com/kynan/nbstripout
    rev: 0.7.1
    hooks:
      - id: nbstripout
        description: "Strips output and some metadata from a notebook."

  - repo: https://github.com/pappasam/toml-sort
    rev: v0.24.2
    hooks:
      - id: toml-sort
        description: "Sort and format toml files."
        args:
          - --all
          - --in-place

  # Ruff is used as both a linter and a formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.0
    hooks:
      - id: ruff
        description: "Runs Ruff as a Python linter."
        args: [--fix]
      - id: ruff-format
        description: "Formats Python code using Ruff."

  # Linters
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        description: "Lints YAML files for syntax and stylistic issues."
        args:
          - --config-file=.yamllint.yaml

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.42.0
    hooks:
      - id: markdownlint
        description: "Lints Markdown files for consistent formatting."
        args:
          - --config=.markdownlint.yaml
        # Exclude acronyms.md from markdownlint, as it cannot have a title.
        exclude: includes/acronyms.md

  - repo: local
    # We do not use pre-commit/mirrors-mypy, as it comes with opinionated defaults (like --ignore-missing-imports)
    # and is difficult to configure to run with the dependencies correctly installed
    # cf. https://jaredkhan.com/blog/mypy-pre-commit
    hooks:
      - id: mypy
        name: mypy
        entry: "uv run mypy bench_mhc tests --config-file pyproject.toml"
        language: system # Run the hook in the system environment and do not re-create a virtual environment
        types: [python] # Trigger hook only for commits updating Python files
        require_serial: true # Use require_serial so that script is only called once per commit
        pass_filenames: false # Do no pass filenames to the entry command

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        description: "Enforces conventional commit message styles."
        stages: [commit-msg]
        args: ["ci", "build", "docs", "feat", "fix", "perf", "refactor", "style", "test"]

  - repo: https://github.com/codespell-project/codespell
    rev: v2.3.0
    hooks:
      - id: codespell
        name: codespell
        description: "Checks for common misspellings in text files."
        entry: codespell --skip="*.js,*.json" --ignore-words=.codespell-ignore.txt
        language: python
        types: [text]

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.7.8 # must match UV_VERSION from Dockerfile
    hooks:
      - id: uv-lock
        description: "Check dependencies locked in `uv.lock` are synced with `pyproject.toml`."
        name: uv-lock

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        description: "Detect hardcoded secrets in staged changes."
