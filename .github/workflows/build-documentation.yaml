name: Build documentation and maybe deploy it

on:
  push:
    branches: [main]
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

env:
  IMAGE_TAG: ghcr.io/instadeepai/bench-mhc-public/docs:${{ github.sha }}
  IS_FORK: >-
    ${{
      github.event_name == 'pull_request'
      && github.event.pull_request.head.repo.full_name != github.repository
    }}

jobs:
  build-docs:
    name: Build documentation site
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          docker system prune -af || true

      - name: Checkout the code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necessary for mkdocs to access git history (for dates/authors plugins)

      - name: Log in to GHCR
        if: env.IS_FORK != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build the docs image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: docs
          push: false
          load: true
          tags: ${{ env.IMAGE_TAG }}
          cache-from: type=registry,ref=ghcr.io/instadeepai/bench-mhc-public/docs/cache
          # Pushing the cache to the registry requires write auth, only possible on internal PRs
          cache-to: ${{ env.IS_FORK != 'true' && 'type=registry,ref=ghcr.io/instadeepai/bench-mhc-public/docs/cache,mode=max' || '' }}

      # The volume-mounted /workspace is owned by the host runner UID, not the
      # container user, so we need to add it as a safe directory.
      - name: Build documentation with MkDocs
        run: >
          docker run --rm
          -v ${{ github.workspace }}:/workspace -w /workspace
          -e PYTHONPATH=.
          ${{ env.IMAGE_TAG }}
          bash -c "git config --global --add safe.directory /workspace
          && mkdocs build --strict --verbose"

      - name: Upload pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy-docs:
    name: Deploy documentation to GitHub Pages
    needs: build-docs
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
