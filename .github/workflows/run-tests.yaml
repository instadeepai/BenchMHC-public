name: Run tests

on:
  push:
    branches: [main]
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

env:
  IMAGE_TAG: ghcr.io/instadeepai/bench-mhc-public/test:${{ github.sha }}
  IS_FORK: >-
    ${{
      github.event_name == 'pull_request'
      && github.event.pull_request.head.repo.full_name != github.repository
    }}

jobs:
  test:
    name: Build and run tests
    runs-on: ubuntu-latest
    permissions:
      # `contents: write` is required for the pytest-coverage-comment action to
      # create commit comments on push events to main.
      contents: write
      packages: write
      pull-requests: write
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        if: env.IS_FORK != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build the test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: dev
          push: false
          load: true
          tags: ${{ env.IMAGE_TAG }}
          cache-from: type=registry,ref=ghcr.io/instadeepai/bench-mhc-public/test/cache
          # Pushing the cache to the registry requires write auth, only possible on internal PRs
          cache-to: ${{ env.IS_FORK != 'true' && 'type=registry,ref=ghcr.io/instadeepai/bench-mhc-public/test/cache,mode=max' || '' }}

      # The volume-mounted /workspace is owned by the host runner UID, not the
      # container user, so we need to add it as a safe directory.
      - name: Run the tests and generate the coverage report
        run: >
          docker run --rm
          -v ${{ github.workspace }}:/workspace -w /workspace
          -e PYTHONPATH=.
          ${{ env.IMAGE_TAG }}
          bash -c "git config --global --add safe.directory /workspace
          && set -o pipefail && pytest tests bench_mhc --doctest-modules --durations=20
          --cov=bench_mhc --cov-report=term-missing --junitxml=pytest.xml
          | tee pytest-coverage.txt"

      - name: Comment the PR with pytest coverage report
        if: always() && env.IS_FORK != 'true'
        id: coverageComment
        uses: MishaKav/pytest-coverage-comment@287292879eaaff04116f36d3eb1a670f6e5df1a4 # v1.7.1
        with:
          pytest-coverage-path: ./pytest-coverage.txt
          junitxml-path: ./pytest.xml

      - name: Create the coverage badge
        # Only update the badge with coverage report generated on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: schneegans/dynamic-badges-action@e9a478b16159b4d31420099ba146cdc50f134483 # v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 5dd7644b1c2ba953ead3da6973d5579c
          filename: pytest-coverage_bench-mhc-public_main.json
          label: Coverage
          message: ${{ steps.coverageComment.outputs.coverage }}
          color: ${{ steps.coverageComment.outputs.color }}
          namedLogo: python
          logoColor: white
