# Issue form for a feature

name: Feature
description: File a feature request or proposal.
title: "[Feature]: "
labels: ["feat"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to fill out this feature request or proposal!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Please describe the feature.
      placeholder: What functionality should we add to the repo?
    validations:
      required: true
  - type: textarea
    id: implementation
    attributes:
      label: Implementation overview
      description: If possible, please provide a proposal for the implementation.
      placeholder: How to make it work?
    validations:
      required: false
  - type: textarea
    id: usage
    attributes:
      label: Usage details
      description: Please describe how this feature will be used.
      placeholder: How will we use this feature?
    validations:
      required: false
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Please add the issues needed to be closed to implement this feature, if relevant.
    validations:
      required: false
  - type: textarea
    id: additional-info
    attributes:
      label: Additional information
      description: Please add any additional information if needed.
      placeholder: Anything to add?
    validations:
      required: false
  - type: input
    id: contact
    attributes:
      label: Contact Details
      description: How can we get in touch with you if we need more info?
      placeholder: e.g. email@example.com or GitHub ID
    validations:
      required: false
