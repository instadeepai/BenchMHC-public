# Issue form for a CI change

name: Continuous integration
description: File a request or proposal to change our CI configuration files and scripts.
title: "[CI]: "
labels: ["ci"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to fill out this CI request or proposal!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Please describe the CI configuration that should be changed or added.
      placeholder: What should be changed or added?
    validations:
      required: true
  - type: textarea
    id: implementation
    attributes:
      label: Implementation overview
      description: If possible, please provide a proposal for the CI.
      placeholder: How to make it work?
    validations:
      required: false
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Please add the issues needed to be closed to implement this CI, if relevant.
    validations:
      required: false
  - type: textarea
    id: additional-info
    attributes:
      label: Additional information
      description: Please add any additional information if needed.
      placeholder: Anything to add?
    validations:
      required: false
  - type: input
    id: contact
    attributes:
      label: Contact Details
      description: How can we get in touch with you if we need more info?
      placeholder: e.g. email@example.com or GitHub ID
    validations:
      required: false
