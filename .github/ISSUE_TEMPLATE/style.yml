# Issue form for a style change

name: Style
description: File a request or proposal to change something that do not affect the meaning of the code (e.g. white-space, formatting, etc.).
title: "[Style]: "
labels: ["style"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to fill out this style request or proposal!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Please describe the style that should be changed.
      placeholder: What should be changed?
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Please add the issues needed to be closed to implement this style change, if relevant.
    validations:
      required: false
  - type: textarea
    id: additional-info
    attributes:
      label: Additional information
      description: Please add any additional information if needed.
      placeholder: Anything to add?
    validations:
      required: false
  - type: input
    id: contact
    attributes:
      label: Contact Details
      description: How can we get in touch with you if we need more info?
      placeholder: e.g. email@example.com or GitHub ID
    validations:
      required: false
