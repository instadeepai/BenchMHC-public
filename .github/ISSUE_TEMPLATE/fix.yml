# Issue form for a bug fix

name: Bug
description: File a bug report.
title: "[Bug]: "
labels: ["fix"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: Please describe the unexpected behavior currently happening.
      placeholder: Tell us what is not normal!
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: Please describe the expected behavior.
      placeholder: Tell us what you expect!
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: On which commit ID are you running the code?
      placeholder: e.g. b8a37e2
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: >
        Copy and paste any relevant log output. This will be automatically formatted into code,
        so no need for backticks.
      render: shell
    validations:
      required: false
  - type: textarea
    id: additional-info
    attributes:
      label: Additional information
      description: Please add any additional information if needed.
      placeholder: Anything to add?
    validations:
      required: false
  - type: input
    id: contact
    attributes:
      label: Contact Details
      description: How can we get in touch with you if we need more info?
      placeholder: e.g. email@example.com or GitHub ID
    validations:
      required: false
