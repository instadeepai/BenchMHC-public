# Issue form for a documentation

name: Documentation
description: File a documentation request or proposal.
title: "[Documentation]: "
labels: ["docs"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to fill out this documentation request or proposal!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Please describe the documentation that will be added.
      placeholder: What documentation should we add to the repo?
    validations:
      required: true
  - type: input
    id: link
    attributes:
      label: Link to the page
      description: Please paste the link to the documentation, if relevant.
    validations:
      required: false
  - type: input
    id: contact
    attributes:
      label: Contact Details
      description: How can we get in touch with you if we need more info?
      placeholder: e.g. email@example.com or GitHub ID
    validations:
      required: false
