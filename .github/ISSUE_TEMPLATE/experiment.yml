# Issue form for an experiment

name: Experiment
description: File an experiment request or proposal.
title: "[Experiment]: "
labels: ["experiment"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to fill out this experiment request or proposal!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Please describe the experiment you will like (us) to conduct.
      placeholder: What should be investigated?
    validations:
      required: true
  - type: input
    id: contact
    attributes:
      label: Contact Details
      description: How can we get in touch with you if we need more info?
      placeholder: e.g. email@example.com or GitHub ID
    validations:
      required: false
