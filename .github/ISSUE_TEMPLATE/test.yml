# Issue form for a test

name: Test
description: File a test request or proposal.
title: "[Test]: "
labels: ["test"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to fill out this test request or proposal!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Please describe the test(s).
      placeholder: What functionality should we test?
    validations:
      required: true
  - type: textarea
    id: implementation
    attributes:
      label: Implementation overview
      description: If possible, please provide a proposal for the implementation for the test(s).
      placeholder: How to implement it?
    validations:
      required: false
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Please add the issues needed to be closed to implement this test, if relevant.
    validations:
      required: false
  - type: textarea
    id: additional-info
    attributes:
      label: Additional information
      description: Please add any additional information if needed.
      placeholder: Anything to add?
    validations:
      required: false
  - type: input
    id: contact
    attributes:
      label: Contact Details
      description: How can we get in touch with you if we need more info?
      placeholder: e.g. email@example.com or GitHub ID
    validations:
      required: false
